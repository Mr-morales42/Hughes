<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hughe Electrical - Reliable electrical services in Memphis, TN. Call (901) 848-6541 for fast, professional service.">
<meta property="og:title" content="Hughe Electrical - Professional Electrical Services">
<meta property="og:description" content="Reliable electrical services in Memphis, TN">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Hughe Electrical - Professional Electrical Services in Memphis, TN</title>
<style>
body{margin:0;font-family:Arial;}
#hero{background:url('images/hero_image.jpg') center/cover no-repeat;color:white;text-align:center;padding:100px 20px;min-height:300px;}
button{border-radius:20px;padding:10px 20px;background:#FF6600;color:white;border:none;margin:5px;cursor:pointer;font-size:1rem;}
nav{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;}
.nav-links{list-style:none;display:flex;gap:15px;}
.nav-links a{color:white;text-decoration:none;}
.hamburger{display:none;font-size:2rem;cursor:pointer;background:none;border:none;color:white;padding:0;}
@media(max-width:768px){
.nav-links{display:none;flex-direction:column;position:absolute;top:60px;left:0;right:0;background:rgba(0,31,63,0.95);padding:20px;}
.nav-links.active{display:flex;}
.hamburger{display:block;}
}
.carousel{max-width:500px;margin:40px auto;text-align:center;}
.review{display:none;}
.review.active{display:block;}
.carousel-nav{margin-top:10px;}
.carousel-nav button{padding:5px 10px;font-size:0.9rem;}
footer{text-align:center;padding:20px;background:#001f3f;color:white;}
footer a{color:#FF6600;text-decoration:none;}
</style>
</head>
<body>

<header id="hero">
<nav>
<div><strong>Hughe Electrical</strong></div>
<button class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">&#9776;</button>
<ul class="nav-links">
<li><a href="#reviews">Reviews</a></li>
<li><a href="#footer">Contact</a></li>
</ul>
</nav>
<h1>Reliable Electrical Services</h1>
<button onclick="location.href='tel:+19018486541'">Call Now</button>
<button onclick="alert('Quote request form coming soon!')">Get Free Quote</button>
</header>

<section id="reviews" class="carousel">
<h2>Client Reviews</h2>
<div class="review active">★★★★★ Great service!</div>
<div class="review">★★★★★ Highly recommend!</div>
<div class="review">★★★★★ Fast & reliable!</div>
<div class="carousel-nav">
<button onclick="prevReview()">← Previous</button>
<button onclick="nextReview()">Next →</button>
</div>
</section>

<footer id="footer">
<p>Phone: <a href="tel:+19018486541">(901) 848-6541</a></p>
<p><a href="https://www.facebook.com/hughes.electrical1">Facebook</a></p>
</footer>

<script>
const reviews=document.querySelectorAll('.review');
const hamburger=document.querySelector('.hamburger');
const navLinks=document.querySelector('.nav-links');
let index=0;

// Hamburger menu toggle
hamburger.addEventListener('click',()=>{
navLinks.classList.toggle('active');
hamburger.setAttribute('aria-expanded',navLinks.classList.contains('active'));
});

// Review carousel functions
function showReview(n){
reviews[index].classList.remove('active');
index=(n+reviews.length)%reviews.length;
reviews[index].classList.add('active');
}

function nextReview(){showReview(index+1);}
function prevReview(){showReview(index-1);}

// Auto-rotate reviews
setInterval(nextReview,4000);
</script>

</body>
</html>
